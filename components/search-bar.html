<!-- Princess OS — Search Bar v1 -->
<section class="section">
  <h2>Search Bar v1</h2>

  <div class="search-stage" id="searchStage">
    <div class="search-panel">
      <form class="search-bar" role="search">
        <div class="search-icon">🔍</div>
        <input class="search-input" type="search" placeholder="도서관, 퀘스트, 일정, 세린에게 검색" />
        <button class="search-action" type="submit">검색</button>
      </form>

      <div class="search-suggestions">
        <p class="search-suggestion-title">세린 추천 검색</p>
        <div class="search-chip-row">
          <span class="chip active">📜 오늘 퀘스트</span>
          <span class="chip glass">📅 이번 주 일정</span>
          <span class="chip">📚 최근 메모</span>
          <span class="chip gold">🏆 보상</span>
        </div>

        <article class="search-result">
          <div class="search-result-icon">📜</div>
          <div>
            <h4>오늘의 왕실 퀘스트</h4>
            <p>세린이 우선순위 높은 업무 3개를 정리했습니다.</p>
          </div>
          <span class="search-shortcut">⌘1</span>
        </article>

        <article class="search-result">
          <div class="search-result-icon">📅</div>
          <div>
            <h4>15:00 프로젝트 체크인</h4>
            <p>회의 전 필요한 메모를 불러올 수 있습니다.</p>
          </div>
          <span class="search-shortcut">⌘2</span>
        </article>

        <article class="search-result">
          <div class="search-result-icon">☕</div>
          <div>
            <h4>세린에게 질문하기</h4>
            <p>일정 추천, 검색, 메모 요약을 요청할 수 있습니다.</p>
          </div>
          <span class="search-shortcut">⌘K</span>
        </article>
      </div>
    </div>

    <div class="search-floating">
      <form class="search-bar search-compact" role="search">
        <div class="search-icon">✨</div>
        <input class="search-input" type="search" placeholder="세린에게 빠르게 물어보기" />
      </form>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary btn-md" onclick="document.getElementById('searchStage').classList.toggle('night')">🌙 낮/밤 전환</button>
  </div>
</section>
