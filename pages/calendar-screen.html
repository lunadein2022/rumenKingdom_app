<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Princess OS Calendar Screen</title>
<link rel="stylesheet" href="../styles/foundation.css">
<link rel="stylesheet" href="../styles/button.css">
<link rel="stylesheet" href="../styles/calendar-screen.css">
<link rel="stylesheet" href="../styles/navigation.css">
<style>.crystal-dock a{text-decoration:none}</style>
</head>
<body>
<main class="calendar-screen">
<div><a href="../index.html" style="font-size:13px;color:#5D6478;text-decoration:none;">‹ 디자인 시스템으로</a></div>

<section class="calendar-hero">
  <h1>📅 Royal Calendar</h1>
  <p>공주님의 일정과 퀘스트 시간을 세린이 정리합니다.</p>
  <button class="btn btn-primary btn-md">+ 일정 추가</button>
</section>

<section class="calendar-layout">

  <section class="calendar-panel">
    <div class="calendar-toolbar">
      <button class="btn btn-secondary btn-md">← 이전</button>
      <h2 class="calendar-month">July 2026</h2>
      <button class="btn btn-secondary btn-md">다음 →</button>
    </div>

    <div class="calendar-weekdays">
      <div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div><div>SUN</div>
    </div>

    <div class="calendar-month-grid">
      <button class="calendar-day"><span class="day-num">1</span></button>
      <button class="calendar-day"><span class="day-num">2</span><span class="day-event-dot"></span><span class="day-count">1 event</span></button>
      <button class="calendar-day"><span class="day-num">3</span></button>
      <button class="calendar-day"><span class="day-num">4</span></button>
      <button class="calendar-day"><span class="day-num">5</span></button>
      <button class="calendar-day"><span class="day-num">6</span></button>
      <button class="calendar-day"><span class="day-num">7</span></button>
      <button class="calendar-day"><span class="day-num">8</span><span class="day-event-dot"></span><span class="day-count">2 events</span></button>
      <button class="calendar-day today selected"><span class="day-num">9</span><span class="day-event-dot"></span><span class="day-count">3 events</span></button>
      <button class="calendar-day"><span class="day-num">10</span></button>
      <button class="calendar-day"><span class="day-num">11</span></button>
      <button class="calendar-day"><span class="day-num">12</span></button>
      <button class="calendar-day"><span class="day-num">13</span></button>
      <button class="calendar-day"><span class="day-num">14</span></button>
      <button class="calendar-day"><span class="day-num">15</span></button>
      <button class="calendar-day"><span class="day-num">16</span><span class="day-event-dot"></span></button>
      <button class="calendar-day"><span class="day-num">17</span></button>
      <button class="calendar-day"><span class="day-num">18</span></button>
      <button class="calendar-day"><span class="day-num">19</span></button>
      <button class="calendar-day"><span class="day-num">20</span></button>
      <button class="calendar-day"><span class="day-num">21</span></button>
    </div>
  </section>

  <aside class="day-panel">
    <h2>오늘의 일정</h2>
    <div class="timeline">
      <article class="timeline-item">
        <div class="timeline-time">09:30</div>
        <div class="timeline-card">
          <h4>집무실 업무 정리</h4>
          <p>세린이 문서 작업을 퀘스트로 변환합니다.</p>
        </div>
      </article>

      <article class="timeline-item">
        <div class="timeline-time">15:00</div>
        <div class="timeline-card">
          <h4>프로젝트 체크인</h4>
          <p>회의 30분 전 브리핑 알림.</p>
        </div>
      </article>

      <article class="timeline-item">
        <div class="timeline-time">21:30</div>
        <div class="timeline-card">
          <h4>달빛 회고</h4>
          <p>오늘 완료한 퀘스트를 정리합니다.</p>
        </div>
      </article>
    </div>

    <div class="serin-schedule">
      <img src="../assets/serin-bust.png" alt="세린">
      <p><b>세린 제안</b><br>15:00 회의 전 20분 집중 퀘스트를 추천합니다.</p>
    </div>
  </aside>

</section>

<!-- Bottom Navigation Component 삽입 -->
<div style="position:relative;height:120px;">
  <div class="bottom-area">
    <div class="nav-shell">
      <nav class="crystal-dock">
        <a class="nav-item" href="home-scene-ultimate.html"><span class="nav-icon">🏰</span><span class="nav-label">홈</span></a>
        <a class="nav-item" href="quest-screen.html"><span class="nav-icon">📜</span><span class="nav-label">퀘스트</span></a>
        <div class="serin-zone">
          <a class="serin-core" href="serin-screen.html">
            <span class="serin-orbit"></span><span class="serin-ring"></span>
            <span class="serin-star s1"></span><span class="serin-star s2"></span><span class="serin-star s3"></span>
            <span class="serin-face"><img src="../assets/serin-bust.png" alt="세린"></span>
            <span class="status" data-serin-status>✨</span>
          </a>
        </div>
        <a class="nav-item active" href="calendar-screen.html"><span class="nav-icon">📅</span><span class="nav-label">캘린더</span></a>
        <button type="button" class="nav-item" id="navSettingsBtn"><span class="nav-icon">⚙️</span><span class="nav-label">설정</span></button>
      </nav>
    </div>
  </div>
</div>

</main>
<script src="../scripts/calendar-screen.js"></script>
<script src="../scripts/nav.js"></script>
</body>
</html>
