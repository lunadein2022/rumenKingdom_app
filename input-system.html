<!doctype html><html lang="ko"><head><title>Input System</title><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="styles/foundation.css"><link rel="stylesheet" href="styles/button.css"><link rel="stylesheet" href="styles/card.css"><link rel="stylesheet" href="styles/navigation.css"><link rel="stylesheet" href="styles/forms.css"><link rel="stylesheet" href="styles/search.css"><link rel="stylesheet" href="styles/dialog.css"><link rel="stylesheet" href="styles/calendar.css"><link rel="stylesheet" href="styles/quest.css"><link rel="stylesheet" href="styles/progress.css"><link rel="stylesheet" href="styles/home-layout.css"><script defer src="scripts/app.js"></script><script defer src="scripts/search.js"></script><script defer src="scripts/dialog.js"></script><script defer src="scripts/calendar.js"></script><script defer src="scripts/quest.js"></script><script defer src="scripts/progress.js"></script><script defer src="scripts/home-layout.js"></script></head><body><main class="page"><section class="hero"><h1>Input System v1</h1><p class="subtitle">검색, 메모, 퀘스트 생성, 설정 입력에 사용하는 Glass Input 컴포넌트.</p><div class="component-nav"><a href="index.html">Overview</a><a href="button-system.html">Button</a><a href="card-system.html">Card</a><a href="bottom-navigation.html">Bottom Nav</a><a href="serin-avatar.html">Serin Avatar</a><a href="input-system.html">Input</a><a href="badge-chip.html">Badge/Chip</a><a href="toast-sheet.html">Toast/Sheet</a><a href="top-app-bar.html">Top Bar</a><a href="search-bar.html">Search</a><a href="dialog.html">Dialog</a><a href="calendar-components.html">Calendar</a><a href="quest-components.html">Quest</a><a href="progress-system.html">Progress</a><a href="home-layout.html">Home Layout</a><a href="home-screen.html">Home</a></div></section><section class="section"><h2>Fields</h2><div class="field-grid">
<div class="field"><label>기본 입력</label><input class="input-field" placeholder="퀘스트 이름 입력"><span class="field-help">일반 텍스트 입력</span></div>
<div class="field"><label>아이콘 입력</label><div class="input-wrap"><span class="input-icon">🔍</span><input class="input-field has-icon" placeholder="도서관에서 검색"></div><span class="field-help">검색/AI 입력용</span></div>
<div class="field"><label>성공 상태</label><input class="input-field success" value="오늘의 퀘스트"><span class="field-help">저장 가능한 상태</span></div>
<div class="field"><label>오류 상태</label><input class="input-field error" value=" " placeholder="필수 값을 입력하세요"><span class="field-help" style="color:var(--danger)">필수 항목입니다.</span></div>
<div class="field" style="grid-column:1/-1"><label>메모 / 세린 프롬프트</label><textarea class="input-field" placeholder="세린에게 정리해달라고 할 내용을 입력하세요."></textarea></div>
</div></section></main></body></html>
